security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    role_hierarchy:
        ROLE_ADMIN: ROLE_USER
        ROLE_SUPER_ADMIN: ROLE_ADMIN

    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User

    firewalls:
        dev:
            # Ensure dev tools and static assets are always allowed
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        # Darkwood API: stateful so DarkwoodGameService can use session (flash, combat state)
        darkwood_api:
            pattern: ^/api/darkwood
            stateless: false
            provider: app_user_provider
            jwt: ~
        api:
            pattern: ^/api/
            stateless: true
            provider: app_user_provider
            jwt: ~
        main:
            lazy: true
            provider: app_user_provider
            json_login:
                check_path: auth # The name in routes.yaml is enough for mapping
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure
            custom_authenticators:
                - App\Security\LoginFormAuthenticator
                #- App\Security\FacebookAuthenticator
            entry_point: App\Security\LoginFormAuthenticator
            logout:
                path: security_logout
                # where to redirect after logout
                # target: app_any_route
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 3600
                path: /
                domain: '%env(COOKIE_DOMAIN)%'
                secure: auto
                samesite: lax
            two_factor:
                auth_form_path: 2fa_login
                check_path: 2fa_login_check
                enable_csrf: true
                csrf_token_id: two_factor
                success_handler: App\Security\TwoFactorSuccessHandler

            # Activate different ways to authenticate:
            # https://symfony.com/doc/current/security.html#the-firewall

            # https://symfony.com/doc/current/security/impersonating_user.html
            # switch_user: true

    # Note: Only the *first* matching rule is applied
    access_control:
        - { path: ^/login$, role: PUBLIC_ACCESS }
        - { path: ^/en/login$, role: PUBLIC_ACCESS }
        - { path: ^/de/login$, role: PUBLIC_ACCESS }
        - { path: ^/logout$, role: PUBLIC_ACCESS }
        - { path: ^/en/logout$, role: PUBLIC_ACCESS }
        - { path: ^/de/logout$, role: PUBLIC_ACCESS }
        - { path: ^/2fa$, role: IS_AUTHENTICATED_2FA_IN_PROGRESS }
        - { path: ^/2fa_check$, role: IS_AUTHENTICATED_2FA_IN_PROGRESS }
        - { path: ^/, host: '%admin_host%', role: ROLE_ADMIN }
        - { path: ^/$, host: '%api_host%', roles: PUBLIC_ACCESS } # Allows accessing the Swagger UI
        - { path: ^/docs, host: '%api_host%', roles: PUBLIC_ACCESS } # Allows accessing API documentations and Swagger UI docs
        - { path: ^/auth, host: '%api_host%', roles: PUBLIC_ACCESS }
        - { path: ^/api/darkwood, host: '%api_host%', roles: PUBLIC_ACCESS } # Darkwood API: auth via X-API-Key in DarkwoodBetaAccessSubscriber
        - { path: ^/api/hello_(profile|experiences|projects|skills)$, host: '%api_host%', roles: PUBLIC_ACCESS } # Hello CV read API
        - { path: ^/mcp, host: '%api_host%', roles: PUBLIC_ACCESS } # MCP (Hello CV + API Platform tools)

when@test:
    security:
        password_hashers:
            # Password hashers are resource-intensive by design to ensure security.
            # In tests, it's safe to reduce their cost to improve performance.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
