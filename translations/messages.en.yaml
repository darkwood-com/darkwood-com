  about:
    title: About me
    lead: Senior engineer designing reliable systems, APIs, and automation pipelines.
    text: |
      I work at the intersection of backend architecture, data orchestration, and pragmatic AI integration, with a strong focus on maintainability and performance.

      I structure systems to stay readable and evolvable over time. From API design to production orchestration, I focus on building systems that behave predictably under real world constraints.

      Automation and data pipelines are where systems are truly tested: observability, progressive delivery, and control over complexity.

      AI integration remains pragmatic: guardrails first, measurable systems, and predictable performance at scale.
