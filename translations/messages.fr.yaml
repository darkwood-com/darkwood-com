        module_a_body: Architecture lisible, mouvement net, hiérarchie alignée.
        module_b_title: Orchestration
        module_b_body: Des transitions liées comme une seule séquence composée.
        module_c_title: Répétabilité
        module_c_body: Des systèmes qui changent d'échelle parce que le rythme reste fiable.
      continuity:
