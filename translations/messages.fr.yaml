        label: Plan d'ouverture
        eyebrow: Artisanat logiciel, réglé avec intention.
        title_line_1: Mouvement
        title_line_2: enterprise,
        title_line_3: sans bruit.
        statement: Des années d'exécution condensées en contrôle, rythme éditorial et systèmes qui avancent avec certitude.
        integrity: Intégrité de séquence
        integrity_status: Stable
      statement:
        label: Enterprise / précision
        kicker: Construit sous contrainte. Aucune approximation.
        body: Systèmes complexes. Cycles longs. Exigence élevée. Le détail, là où il n'est pas négociable.
        card_1_title: Cadence enterprise
        card_1_body: Délivrer sous contrainte, avec tenue.
        card_2_title: Du design à l'implémentation
        card_2_body: Le concept traduit avec fidélité technique.
        card_3_title: Confiance opérationnelle
        card_3_body: Des systèmes qui ne cèdent pas sous pression.
      calibration:
        label: Calibration / instrumentation
        eyebrow: Mesuré. Séquencé. Répétable.
        title_line_1: La précision devient visible
        title_line_2: par la calibration.
        readout_1_label: Dérive de latence
        readout_2_label: Verrou module
        readout_2_value: Nominal
      assembly:
