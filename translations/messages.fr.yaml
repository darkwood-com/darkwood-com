      email: Inscrire votre adresse email
      submit: S'inscrire
      intro: Abonnez vous à la newsletter.
      footer: En vous abonnant, vous acceptez les <a target="_blank" href="https://www.getrevue.co/terms?locale=fr">Conditions d'utilisation</a> et la <a target="_blank" href="https://www.getrevue.co/privacy?locale=fr">Politique de confidentialité</a> du service Revue.
  about:
    title: A propos
    lead: Ingénieur senior spécialisé dans la conception de systèmes fiables, d'API et de pipelines d'automatisation.
    text: |
      Je travaille à l'intersection de l'architecture backend, de l'orchestration des données et de l'intégration pragmatique de l'IA, en privilégiant la maintenabilité et la performance.

      Je structure les systèmes pour qu'ils restent lisibles et évolutifs. De la conception des API à l'orchestration en production, je m'attache à créer des systèmes dont le comportement est prévisible face aux contraintes du monde réel.

      L'automatisation et les pipelines de données sont les véritables terrains d'expérimentation des systèmes : observabilité, déploiement progressif et maîtrise de la complexité.

      L'intégration de l'IA reste pragmatique : mise en place de garde-fous, systèmes mesurables et performances prévisibles à grande échelle.
    cta_contact: Me contacter
    cta_cv: Voir mon CV
